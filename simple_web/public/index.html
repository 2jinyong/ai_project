<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 이미지 분석 서비스</title>
    <style>
        /* 미니멀 다크 모드 디자인 */
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --input-bg: #2c2c2c;
            --border-color: #333;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 { margin-bottom: 1.5rem; font-weight: 700; color: var(--accent-color); }

        /* 업로드 섹션 */
        .upload-box {
            border: 2px dashed var(--border-color);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .upload-box:hover { border-color: var(--accent-color); }

        #preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            display: none;
            margin-top: 15px;
        }

        /* 입력창 및 버튼 */
        textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            resize: none;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: #121212;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: #666; cursor: not-allowed; }

        /* 로딩 애니메이션 */
        .loading {
            display: none;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--accent-color);
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(187, 134, 252, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 결과 창 */
        #result-box {
            margin-top: 25px;
            text-align: left;
            display: none;
            background-color: var(--input-bg);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }
        .result-title { font-weight: bold; margin-bottom: 5px; color: var(--accent-color); }
        .result-content { line-height: 1.6; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Vision Analysis</h1>
        
        <div class="upload-box" onclick="document.getElementById('imageInput').click()">
            <p id="uploadText">이미지를 선택하거나 드래그하세요</p>
            <img id="preview" alt="미리보기">
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display: none" onchange="handleImage(this)">

        <textarea id="questionInput" rows="3" placeholder="이미지에 대해 궁금한 점을 입력하세요..."></textarea>
        
        <button id="analyzeBtn" onclick="analyzeImage()">분석하기</button>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <span>AI가 분석중입니다...</span>
        </div>

        <div id="result-box">
            <div class="result-title">분석 결과</div>
            <div id="resultContent" class="result-content"></div>
        </div>
    </div>

    <script>
        // 이미지 미리보기 로직
        function handleImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('preview');
                    const uploadText = document.getElementById('uploadText');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    uploadText.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }

        // 분석 요청 로직
        async function analyzeImage() {
            const imageInput = document.getElementById('imageInput');
            const questionInput = document.getElementById('questionInput');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loading');
            const resultBox = document.getElementById('result-box');
            const resultContent = document.getElementById('resultContent');

            if (!imageInput.files[0]) {
                alert('이미지를 선택해주세요.');
                return;
            }

            // UI 상태 업데이트: 버튼 비활성화 및 로딩 표시
            analyzeBtn.disabled = true;
            loading.style.display = 'block';
            resultBox.style.display = 'none';

            const formData = new FormData();
            formData.append('image', imageInput.files[0]);
            formData.append('question', questionInput.value);

            try {
                // Node.js 서버로 데이터 전송
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // 결과 표시 (FastAPI의 응답 구조에 맞게 조정 필요)
                    resultContent.innerText = data.answer || JSON.stringify(data, null, 2);
                    resultBox.style.display = 'block';
                } else {
                    alert('에러 발생: ' + (data.error || '알 수 없는 오류'));
                }
            } catch (error) {
                console.error('요청 실패:', error);
                alert('서버와 통신하는 중 오류가 발생했습니다.');
            } finally {
                // UI 상태 복구
                analyzeBtn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
